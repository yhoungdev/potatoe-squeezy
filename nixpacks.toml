[phases.setup]

nixPkgs = ["nodejs_20", "curl", "bash", "unzip"]

[phases.install]
cmds = [
  "curl -fsSL https://bun.sh/install | bash",
  "cd apps/server && $HOME/.bun/bin/bun install --frozen-lockfile",
]

[start]
cmd = "export PATH=\"$HOME/.bun/bin:$PATH\" && cd apps/server && bun run src/index.ts"
